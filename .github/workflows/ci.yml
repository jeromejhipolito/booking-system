name: CI

on:
  push:
    branches: [master, main, 'feature/**']
  pull_request:
    branches: [master, main]

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: booking_user
          POSTGRES_PASSWORD: booking_pass
          POSTGRES_DB: booking_system
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: booking_user
      DATABASE_PASSWORD: booking_pass
      DATABASE_NAME: booking_system
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-test-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build shared packages
      - name: Build shared packages
        run: |
          pnpm --filter @booking/shared-types build
          pnpm --filter @booking/shared-schemas build
          pnpm --filter @booking/shared-constants build
          pnpm --filter @booking/shared-utils build

      # TypeScript type checking
      - name: Type check API
        run: cd apps/api && npx tsc --noEmit

      - name: Type check Web
        run: cd apps/web && npx tsc --noEmit

      # Build API + run TypeORM migrations
      - name: Build API
        run: cd apps/api && npx nest build

      - name: Run migrations
        run: cd apps/api && npx typeorm migration:run -d dist/apps/api/src/database/data-source.js

      - name: Start API
        run: cd apps/api && node dist/apps/api/src/main.js &
        env:
          PORT: 3001

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/v1/health && break || sleep 2
          done

      # Run e2e tests
      - name: Run API tests
        run: cd apps/api && npx jest --forceExit --detectOpenHandles

      # Build frontend
      - name: Build frontend
        run: cd apps/web && NEXT_PUBLIC_DEMO_MODE=true npx next build
